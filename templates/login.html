<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="../static/style.css">
    <title>Login - Admin</title>
</head>
<body class="login-page">
    <div class="login-bg"></div>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="login-card shadow-lg">
            <div class="text-center mb-4">
                <div class="login-avatar">IS</div>
                <h2 class="mt-3">Painel Admin</h2>
                <p class="text-muted mb-0">Acesso restrito</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-danger">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuário ou e-mail</label>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="qa.eng.isaiasilva@gmail.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="••••••••" required>
                </div>
                <button class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
